services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pickpilot
      POSTGRES_USER: pickpilot
      POSTGRES_PASSWORD: pickpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickpilot -d pickpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
